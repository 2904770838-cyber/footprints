<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>天南海北</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&family=Noto+Serif+SC:wght@500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    />
    <link rel="stylesheet" href="./vendor/leaflet.css" />
    <link rel="stylesheet" href="./styles.css?v=29" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"><i data-lucide="map"></i></span>
          <div class="brand-copy">
            <p>China Travel Footprints</p>
            <div class="brand-title-row">
              <h1>天南海北</h1>
              <span class="current-user-chip" title="当前用户">
                <i data-lucide="user-round"></i>
                <span id="currentUserName">旅人</span>
              </span>
              <button class="name-edit-btn" id="editNameBtn" type="button" title="修改名称">
                <i data-lucide="pencil"></i>
              </button>
            </div>
            <div class="brand-subline" aria-hidden="true">
              <span>flat atlas</span>
              <span>live memories</span>
              <span>shared footprints</span>
            </div>
          </div>
        </div>

        <div class="top-stats" aria-live="polite">
          <div>
            <span id="visitedCount">0</span>
            <small>已点亮</small>
          </div>
          <div>
            <span id="photoCount">0</span>
            <small>照片</small>
          </div>
          <div>
            <span id="progressPercent">0%</span>
            <small>进度</small>
          </div>
        </div>

        <div class="top-actions">
          <button class="icon-btn" id="fitChinaBtn" title="回到全国">
            <i data-lucide="navigation"></i>
          </button>
          <button class="icon-btn" id="toggleLabelsBtn" title="标注：重点名称，点击切换">
            <i data-lucide="tag"></i>
          </button>
          <button class="icon-btn" id="exportBtn" title="导出足迹">
            <i data-lucide="download"></i>
          </button>
          <button class="icon-btn" id="importBtn" title="导入足迹">
            <i data-lucide="upload"></i>
          </button>
          <button class="icon-btn danger-icon" id="clearAllBtn" title="清空我的全部记录">
            <i data-lucide="trash-2"></i>
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="map-stage" aria-label="中国旅游足迹地图">
          <div id="map"></div>
          <div class="map-overlay">
            <div class="search-box">
              <i data-lucide="search"></i>
              <input id="searchInput" type="search" placeholder="搜索城市、地区、港澳台县市" autocomplete="off" />
            </div>
            <select id="provinceFilter" aria-label="省份筛选">
              <option value="">全部地区</option>
            </select>
            <div class="segmented" role="group" aria-label="足迹筛选">
              <button class="active" data-filter="all">全部</button>
              <button data-filter="visited">已点亮</button>
              <button data-filter="photos">有照片</button>
            </div>
            <button class="label-toggle" id="mapLabelToggleBtn" type="button">
              <i data-lucide="tag"></i>
              重点名称
            </button>
          </div>
          <div class="map-stage-note" aria-hidden="true">
            <span>ATLAS MODE</span>
            <p>Search, filter, and illuminate each stop without losing the flat-map clarity.</p>
          </div>
          <div class="legend">
            <span><b class="swatch lit"></b>已点亮</span>
            <span><b class="swatch photo"></b>有照片</span>
            <span><b class="swatch blank"></b>未到达</span>
          </div>
        </section>

        <aside class="side-panel">
          <section class="place-card" id="placeCard">
            <div class="empty-state">
              <i data-lucide="map-pin"></i>
              <h2>点选地图上的地级市</h2>
              <p>轮廓、标签和照片会在这里同步更新。</p>
            </div>
          </section>

          <section class="list-card">
            <div class="section-title">
              <h2 id="listTitle">省份进度</h2>
              <span id="resultCount">0</span>
            </div>
            <div class="place-list" id="placeList"></div>
          </section>

          <section class="gallery-card">
            <div class="section-title">
              <h2>照片墙</h2>
              <span id="galleryCount">0</span>
            </div>
            <div class="gallery" id="gallery"></div>
          </section>
        </aside>
      </main>

      <section class="travelers-section" id="travelersSection">
        <div class="section-title travelers-title">
          <div>
            <h2>旅人足迹</h2>
            <p id="viewModeText">查看全部旅人的公共足迹</p>
          </div>
          <span id="travelerCount">0</span>
        </div>
        <div class="traveler-list" id="travelerList"></div>
      </section>

      <section class="feature-page" id="featurePage" hidden>
        <div class="feature-page-content">
          <i data-lucide="construction"></i>
          <h2>新功能开发中</h2>
          <p>下一段旅程正在整理，敬请期待。</p>
        </div>
      </section>
    </div>

    <button class="page-nav page-nav-left" id="pagePrevBtn" type="button" title="上一页" hidden>
      <i data-lucide="chevron-left"></i>
    </button>
    <button class="page-nav page-nav-right" id="pageNextBtn" type="button" title="下一页">
      <i data-lucide="chevron-right"></i>
    </button>

    <input id="photoInput" type="file" accept="image/*" multiple hidden />
    <input id="importInput" type="file" accept="application/json,.json" hidden />
    <div class="lightbox" id="lightbox" hidden>
      <button class="lightbox-close" id="lightboxClose" type="button" title="关闭大图">
        <i data-lucide="x"></i>
      </button>
      <img id="lightboxImage" alt="旅行照片大图" />
      <p id="lightboxCaption"></p>
    </div>

    <div class="name-dialog" id="nameDialog" hidden>
      <div class="name-dialog-panel">
        <div class="section-title">
          <h2>修改名称</h2>
          <button class="icon-btn" id="nameDialogCancel" type="button" title="关闭">
            <i data-lucide="x"></i>
          </button>
        </div>
        <label>
          当前用户名称
          <input id="nameDialogInput" type="text" maxlength="28" autocomplete="nickname" />
        </label>
        <button class="primary-btn" id="nameDialogSave" type="button">
          <i data-lucide="save"></i>
          保存名称
        </button>
      </div>
    </div>

    <script src="./vendor/leaflet.js"></script>
    <script src="./vendor/lucide.min.js"></script>
    <script src="./vendor/supabase.js"></script>
    <script src="./supabase-config.js?v=2"></script>
    <script src="./app.js?v=28"></script>
  </body>
</html>
